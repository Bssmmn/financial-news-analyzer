<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Financial Analyzer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <div class="title-row">
        <!-- Fixed robot sitting next to the title -->
        <div id="robot-wrap">
            <svg id="robot-svg" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
                <!-- Antenna -->
                <line x1="30" y1="12" x2="30" y2="4" stroke="#60a5fa" stroke-width="2"/>
                <circle cx="30" cy="3" r="3" fill="#38bdf8"/>
                <!-- Head -->
                <rect x="8" y="12" width="44" height="36" rx="8" fill="#1e40af" stroke="#60a5fa" stroke-width="2"/>
                <!-- Left eye -->
                <circle cx="20" cy="28" r="7" fill="#0f172a"/>
                <circle id="left-pupil" cx="20" cy="28" r="3.5" fill="#38bdf8"/>
                <circle id="left-shine" cx="21.5" cy="26.5" r="1.2" fill="white" opacity="0.8"/>
                <!-- Right eye -->
                <circle cx="40" cy="28" r="7" fill="#0f172a"/>
                <circle id="right-pupil" cx="40" cy="28" r="3.5" fill="#38bdf8"/>
                <circle id="right-shine" cx="41.5" cy="26.5" r="1.2" fill="white" opacity="0.8"/>
                <!-- Mouth -->
                <rect x="18" y="38" width="24" height="5" rx="2.5" fill="#0f172a"/>
                <rect id="mouth-bar" x="19" y="39" width="8" height="3" rx="1.5" fill="#38bdf8"/>
                <!-- Ear bolts -->
                <circle cx="8" cy="28" r="3" fill="#1e40af" stroke="#60a5fa" stroke-width="1.5"/>
                <circle cx="52" cy="28" r="3" fill="#1e40af" stroke="#60a5fa" stroke-width="1.5"/>
            </svg>
        </div>
        <div class="title-text">
            <h1>Financial News Analyzer</h1>
            <p class="subtitle">AI-powered sentiment analysis for financial headlines</p>
        </div>
    </div>

    <div class="input-section">
        <textarea id="inputText" placeholder="Paste a financial news headline here..."></textarea>
        <div class="char-count"><span id="charCount">0</span> characters</div>
    </div>

    <div class="buttons">
        <button onclick="getRandom()">🎲 Random News</button>
        <button class="primary" onclick="analyze()">🚀 Analyze</button>
        <button onclick="clearAll()">🗑 Clear</button>
    </div>

    <div id="output"></div>

    <div id="history-section" style="display:none">
        <h2>📋 Analysis History</h2>
        <div id="history-list"></div>
        <button onclick="clearHistory()" style="background:#dc2626; margin-top:10px">🗑 Clear History</button>
    </div>

    <div id="chart-section" style="display:none">
        <h2>📊 Sentiment Breakdown</h2>
        <div class="chart-bars">
            <div class="bar-wrap">
                <div class="bar positive-bar" id="bar-positive"></div>
                <span class="bar-label">Positive <span id="count-positive">0</span></span>
            </div>
            <div class="bar-wrap">
                <div class="bar neutral-bar" id="bar-neutral"></div>
                <span class="bar-label">Neutral <span id="count-neutral">0</span></span>
            </div>
            <div class="bar-wrap">
                <div class="bar negative-bar" id="bar-negative"></div>
                <span class="bar-label">Negative <span id="count-negative">0</span></span>
            </div>
        </div>
    </div>

    <h2>⚔️ Model Comparison</h2>
    <button onclick="compare()">Compare Models</button>
    <div id="leaderboard"></div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
